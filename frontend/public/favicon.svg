<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Modern glowing background with rounded corners -->
  <defs>
    <linearGradient id="bgGradient" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#4F46E5" /> <!-- Indigo 600 -->
      <stop offset="100%" stop-color="#7C3AED" /> <!-- Violet 600 -->
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="24" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    <linearGradient id="iconGradient" x1="128" y1="128" x2="384" y2="384" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#E0E7FF" /> <!-- Indigo 100 -->
    </linearGradient>
  </defs>

  <!-- Base Rectangle with shadow/glow -->
  <rect x="32" y="32" width="448" height="448" rx="112" fill="url(#bgGradient)" filter="url(#glow)"/>
  
  <!-- Subtle inner border for depth -->
  <rect x="34" y="34" width="444" height="444" rx="110" fill="none" stroke="#FFFFFF" stroke-opacity="0.15" stroke-width="4"/>

  <!-- Stylized Bell Icon (Lucide-inspired but thicker and premium) -->
  <path d="M256 120C211.817 120 176 155.817 176 200V280L144 328V344H368V328L336 280V200C336 155.817 300.183 120 256 120Z" fill="url(#iconGradient)"/>
  <path d="M216 360C216 382.091 233.909 400 256 400C278.091 400 296 382.091 296 360H216Z" fill="url(#iconGradient)"/>
  
  <!-- Top Bell loop -->
  <path d="M256 96C247.163 96 240 103.163 240 112V128H272V112C272 103.163 264.837 96 256 96Z" fill="url(#iconGradient)"/>

  <!-- Decorative sparkles -->
  <path d="M120 144L130 160L146 170L130 180L120 196L110 180L94 170L110 160L120 144Z" fill="#FFFFFF" fill-opacity="0.8"/>
  <path d="M380 110L386 122L398 128L386 134L380 146L374 134L362 128L374 122L380 110Z" fill="#FFFFFF" fill-opacity="0.6"/>
</svg>
